<html lang="ja">
<head>

<title>大阪YMCA学院 — 附近房源一览</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefed;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--border3:rgba(0,0,0,0.32);
  --radius-md:8px;--radius-lg:12px;
  --info-bg:#E6F1FB;--info-text:#185FA5;
  --teal-bg:#E1F5EE;--teal-text:#0F6E56;
  --purple-bg:#EEEDFE;--purple-text:#534AB7;
  --green-bg:#EAF3DE;--green-text:#3B6D11;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0efe8;--text2:#b4b2a9;--text3:#888780;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--border3:rgba(255,255,255,0.28);
    --info-bg:#0c447c;--info-text:#b5d4f4;
    --teal-bg:#085041;--teal-text:#9FE1CB;
    --purple-bg:#3C3489;--purple-text:#CECBF6;
    --green-bg:#27500A;--green-text:#C0DD97;
    --amber-bg:#633806;--amber-text:#FAC775;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;padding:1.5rem}
.container{max-width:800px;margin:0 auto}
.header{padding:1rem 0;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem}
.header h1{font-size:18px;font-weight:500;color:var(--text)}
.header p{font-size:13px;color:var(--text2);margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--radius-md);padding:0.75rem 1rem}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:500;color:var(--text)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.filter-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--border2);border-radius:99px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.filter-btn:hover{background:var(--bg2)}
.filter-btn.active{background:var(--bg2);color:var(--text);border-color:var(--border3)}
.list{display:flex;flex-direction:column;gap:6px}
.property-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.15s}
.property-card:hover{border-color:var(--border2)}
.property-card.open{border-color:var(--border3)}
.card-header{display:grid;grid-template-columns:2rem 1fr auto auto auto auto auto;align-items:center;gap:10px;padding:0.75rem 1rem;cursor:pointer}
.card-num{font-size:11px;color:var(--text3);font-weight:500}
.card-name{font-size:14px;font-weight:500;color:var(--text)}
.card-room{font-size:12px;color:var(--text2)}
.card-tag{font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap;cursor:default}
.tag-jissha{background:var(--teal-bg);color:var(--teal-text)}
.tag-itandi{background:var(--info-bg);color:var(--info-text)}
.tag-ii{background:var(--purple-bg);color:var(--purple-text)}
.tag-confirmed{background:var(--green-bg);color:var(--green-text);cursor:pointer}
.tag-unconfirmed{background:var(--amber-bg);color:var(--amber-text);cursor:pointer}
.tag-caution{background:#FCEBEB;color:#A32D2D;cursor:pointer}
@media(prefers-color-scheme:dark){.tag-caution{background:#501313;color:#F7C1C1}}
.card-rent{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap}
.card-rent-sub{font-size:11px;font-weight:400;color:var(--text2)}
.card-walk{font-size:12px;color:var(--text2);white-space:nowrap}
.chevron{font-size:12px;color:var(--text3);transition:transform 0.2s;user-select:none}
.open .chevron{transform:rotate(180deg)}
.card-detail{display:none;padding:0 1rem 1rem;border-top:0.5px solid var(--border)}
.open .card-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
.detail-section h3{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;margin-top:1rem}
.detail-section h3:first-child{margin-top:0}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:0.5px solid var(--border);gap:8px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-size:12px;color:var(--text2);flex-shrink:0}
.detail-val{font-size:12px;color:var(--text);text-align:right}
.detail-val a{color:var(--info-text);text-decoration:none}
.detail-val a:hover{text-decoration:underline}
.equip-tags{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-end}
.equip-tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--bg2);color:var(--text2)}
.no-results{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr}
  .card-header{grid-template-columns:1.5rem 1fr auto auto auto}
  .card-walk{display:none}
}
</style>
</head>

const confirmed = {};
props.forEach(function(p){ confirmed[p.id] = 'unconfirmed'; });
confirmed[4] = 'caution';
confirmed[5] = 'caution';
confirmed[6] = 'confirmed';
confirmed[7] = 'caution';

function fmt(n){ return n ? '\xA5'+n.toLocaleString() : '\u2014'; }

function sourceTag(s){
  if(s==='自社') return '<span class="card-tag tag-jissha">自社</span>';
  if(s==='ITANDI BB') return '<span class="card-tag tag-itandi">ITANDI BB</span>';
  return '<span class="card-tag tag-ii">いい生活</span>';
}

function confirmedTag(id){
  var c = confirmed[id];
  var cls = c==='confirmed' ? 'tag-confirmed' : c==='caution' ? 'tag-caution' : 'tag-unconfirmed';
  var label = c==='confirmed' ? '確認済' : c==='caution' ? '緊急連絡先必要' : '未確認';
  return '<span class="card-tag '+cls+'" onclick="toggleConfirm(event,'+id+')">'+label+'</span>';
}

function toggleConfirm(e, id){
  e.stopPropagation();
  var c = confirmed[id];
  confirmed[id] = c==='unconfirmed' ? 'confirmed' : c==='confirmed' ? 'caution' : 'unconfirmed';
  render();
}

var currentFilter = 'all';

function setFilter(f, btn){
  currentFilter = f;
  var btns = document.querySelectorAll('.filter-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function filtered(){
  return props.filter(function(p){
    if(currentFilter==='all') return true;
    if(currentFilter==='自社') return p.source==='自社';
    if(currentFilter==='ITANDI BB') return p.source==='ITANDI BB';
    if(currentFilter==='いい生活') return p.source==='いい生活';
    if(currentFilter==='walk5') return p.walk<=5;
    if(currentFilter==='walk10') return p.walk<=10;
    if(currentFilter==='under7') return p.rent<=70000;
    if(currentFilter==='confirmed') return confirmed[p.id]==='confirmed';
    if(currentFilter==='unconfirmed') return confirmed[p.id]==='unconfirmed';
    if(currentFilter==='caution') return confirmed[p.id]==='caution';
    return true;
  });
}

function render(){
  var list = document.getElementById('list');
  var noRes = document.getElementById('no-results');
  var data = filtered();
  document.getElementById('s-total').textContent = data.length;
  if(data.length){
    var rents = data.map(function(p){ return p.rent; });
    var avg = Math.round(rents.reduce(function(a,b){ return a+b; },0)/rents.length/1000)*1000;
    document.getElementById('s-avg').textContent = '\xA5'+avg.toLocaleString();
    document.getElementById('s-min').textContent = '\xA5'+Math.min.apply(null,rents).toLocaleString();
    document.getElementById('s-max').textContent = '\xA5'+Math.max.apply(null,rents).toLocaleString();
  }
  noRes.style.display = data.length ? 'none' : 'block';
  var html = '';
  for(var i=0;i<data.length;i++){
    var p = data[i];
    var linkHtml = p.link ? '<a href="'+p.link+'" target="_blank">リンクを開く</a>' : '—';
    var equipHtml = '';
    for(var j=0;j<p.equip.length;j++) equipHtml += '<span class="equip-tag">'+p.equip[j]+'</span>';
    var num = String(p.id); if(num.length<2) num='0'+num;
    html += '<div class="property-card" id="card-'+p.id+'">';
    html += '<div class="card-header" onclick="toggle('+p.id+')">';
    html += '<span class="card-num">'+num+'</span>';
    html += '<div><div class="card-name">'+p.name+'</div><div class="card-room">'+p.room+' · '+p.madori+' · '+p.area+'</div></div>';
    html += sourceTag(p.source);
    html += confirmedTag(p.id);
    html += '<span class="card-rent">'+fmt(p.rent)+'<span class="card-rent-sub">/月</span></span>';
    html += '<span class="card-walk">徒歩'+p.walk+'分</span>';
    html += '<span class="chevron">▼</span>';
    html += '</div>';

    html += '<div class="detail-row"><span class="detail-key">その他費用</span><span class="detail-val">'+p.other_fees+'</span></div>';
    html += '<h3>契約・保証</h3>';
    html += '<div class="detail-row"><span class="detail-key">保証会社</span><span class="detail-val">'+p.guarantee+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">外国籍</span><span class="detail-val">'+p.foreign+'</span></div>';
    html += '<h3>管理会社</h3>';
    html += '<div class="detail-row"><span class="detail-key">会社名</span><span class="detail-val">'+p.mgmt_co+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">電話</span><span class="detail-val">'+p.mgmt_tel+'</span></div>';
    html += '<div class="detail-row"><span class="detail-key">房源</span><span class="detail-val">'+sourceTag(p.source)+'</span></div>';
    html += '</div></div></div></div>';
  }
  list.innerHTML = html;
}

function toggle(id){
  var card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

render();
</script>
